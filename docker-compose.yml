version: "3.8"

services:
  minio:
    image: minio/minio:latest
    container_name: industrial-data-lake
    profiles: ["storage"]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: IndustrialEdgeLabs2026
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  minio_data:
